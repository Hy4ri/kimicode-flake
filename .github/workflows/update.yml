name: Update Kimi Code

on:
  schedule:
    # Run every 6 hours to catch new releases
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  update-kimi-code:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Check for updates
        id: check
        run: |
          echo "Fetching latest kimi-code version..."
          LATEST_VERSION=$(curl -fsSL "https://code.kimi.com/kimi-code/latest" | tr -d '[:space:]')

          if [ -z "$LATEST_VERSION" ]; then
            echo "Could not fetch latest version."
            exit 1
          fi
          echo "Latest: $LATEST_VERSION"

          CURRENT_VERSION=$(jq -r '.version' version.json)
          echo "Current: $CURRENT_VERSION"

          if [ "$LATEST_VERSION" != "$CURRENT_VERSION" ]; then
            echo "New version available!"
            echo "update_needed=true" >> $GITHUB_OUTPUT
            echo "version=$LATEST_VERSION" >> $GITHUB_OUTPUT
          else
            echo "Already up to date."
            echo "update_needed=false" >> $GITHUB_OUTPUT
          fi

      - name: Update to new version
        if: steps.check.outputs.update_needed == 'true'
        run: |
          chmod +x ./update-version.sh
          ./update-version.sh "${{ steps.check.outputs.version }}"

      - name: Commit and Push
        if: steps.check.outputs.update_needed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: update kimi-code to ${{ steps.check.outputs.version }}"
          git push
